<style type="text/css">
    #h {
        background-color: rgb(4, 30, 122);
        height: 180px;
        margin: 0px;
        padding: 0px;
        position: fixed;
        width: 100%;
        top: 0px;
    }
    #title {
        text-align: left;
        display: none;
    }
    #nav {
        align-items: center;
        display: inline-grid;
        font-family: 'Staatliches', cursive;
        font-size: 25px;
        grid-column-gap: 20px;
        grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 1fr 1fr;
        list-style-type: none;
        margin: 0px auto;
        text-align: center;
        text-transform: uppercase;
        width: 98%;
    }
    #logo {
        width: 250px;
    }
    #nav > li, #nav > li > a {
        color: rgb(255, 230, 5);
        text-decoration: none;
    }
    #nav > li > a:hover {
        color: rgb(255, 255, 255);
    }
    #h-content {
        width: 80%;
        margin: auto;
    }
    #h.scrolled {
        height: 100px;
    }
    .scrolled #title {
        display: initial;
    }
    .scrolled #logo {
        width: 100px;
    }
    .scrolled #nav {
        grid-template-columns: 0.5fr 2.5fr 1fr 1fr 1fr 1fr 1fr;
    }
</style>
<link href="https://fonts.googleapis.com/css2?family=Staatliches&display=swap" rel="stylesheet">
<div id="h">
    <div id="h-content">
        <ul id="nav">
            <img id="logo" src="images/logo-fundo-azul.svg"/>
            <li><h1 id="title">RATERIA</h1></li>
            <li><a href="">Página Inicial</a></li>
            <li><a href="">Quem somos</a></li>
            <li><a href="">apresentações</a></li>
            <li><a href="">Nossos serviços</a></li>
            <li><a href="">Fale conosco</a></li>
        </ul>
    </div>
</div>
<script type="text/javascript">
    window.onscroll = function() {
        var winScroll = document.documentElement.scrollTop;
        if (winScroll != 0)
            $("#h").addClass("scrolled");
        else
            $("#h").removeClass("scrolled");
    }
</script>
